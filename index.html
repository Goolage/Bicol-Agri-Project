<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bicol 農業計畫聯絡測試</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen">
    <div class="bg-white p-8 rounded-lg shadow-md w-full max-w-md">
        <h1 class="text-2xl font-bold mb-6 text-green-700 text-center">聯絡我們 - 8公頃示範區</h1>
        
        <form action="https://formspree.io/f/mkoqodyb" method="POST">
            <div class="mb-4">
                <label class="block text-gray-700 text-sm font-bold mb-2">您的姓名</label>
                <input type="text" name="name" class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500" placeholder="請輸入姓名" required>
            </div>
            
            <div class="mb-4">
                <label class="block text-gray-700 text-sm font-bold mb-2">電子郵件</label>
                <input type="email" name="email" class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500" placeholder="cph25@hotmail.com" required>
            </div>
            
            <div class="mb-6">
                <label class="block text-gray-700 text-sm font-bold mb-2">訊息內容</label>
                <textarea name="message" rows="4" class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500" placeholder="您對計畫感興趣的部分..." required></textarea>
            </div>
            
            <button type="submit" class="w-full bg-green-600 text-white font-bold py-2 px-4 rounded-lg hover:bg-green-700 transition duration-300">
                Submit Interest (正式發送)
            </button>
        </form>
        
        <p class="mt-4 text-xs text-center text-gray-500">
            訊息將直接傳送到您的 cph25@hotmail.com
        </p>
    </div>
</body>
</html>

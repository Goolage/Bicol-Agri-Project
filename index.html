<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bicol 農業計畫聯絡測試</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen">
    <div class="bg-white p-8 rounded-lg shadow-md w-full max-w-md">
        <h1 class="text-2xl font-bold mb-6 text-green-700 text-center">聯絡我們 - 8公頃示範區</h1>
        
        <form <form action="https://formspree.io/f/mkoqodyb" method="POST" class="space-y-4">
    <div>
        <label class="block text-sm font-medium mb-1">Name</label>
        <input type="text" name="name" class="w-full p-2 bg-white/10 border border-white/20 rounded focus:border-green-400 outline-none" required>
    </div>
    <div>
        <label class="block text-sm font-medium mb-1">Email</label>
        <input type="email" name="_replyto" class="w-full p-2 bg-white/10 border border-white/20 rounded focus:border-green-400 outline-none" required>
    </div>
    <div>
        <label class="block text-sm font-medium mb-1">Brief description of your interest</label>
        <textarea name="message" rows="3" class="w-full p-2 bg-white/10 border border-white/20 rounded focus:border-green-400 outline-none" required></textarea>
    </div>
    
    <button type="submit" class="w-full py-3 px-4 bg-gradient-to-r from-green-400 to-yellow-200 text-green-900 font-bold rounded-lg hover:opacity-90 transition shadow-lg">
        Submit interest (demo)
    </button>
</form>
        </form>
        
        <p class="mt-4 text-xs text-center text-gray-500">
            訊息將直接傳送到您的 cph25@hotmail.com
        </p>
    </div>
</body>
</html>
